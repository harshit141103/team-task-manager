  /api/tasks/:
    get:
      operationId: api_tasks_list
      parameters:
      - in: query
        name: assigned_to_me
        schema:
          type: boolean
      - in: query
        name: assigned_user
        schema:
          type: string
          format: uuid
      - in: query
        name: due_after
        schema:
          type: string
          format: date-time
      - in: query
        name: due_before
        schema:
          type: string
          format: date-time
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: priority
        schema:
          type: string
          enum:
          - high
          - low
          - medium
          - urgent
        description: |-
          * `low` - Low
          * `medium` - Medium
          * `high` - High
          * `urgent` - Urgent
      - in: query
        name: project
        schema:
          type: string
          format: uuid
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - completed
          - in_progress
          - review
          - todo
        description: |-
          * `todo` - Todo
          * `in_progress` - In Progress
          * `review` - Review
          * `completed` - Completed
