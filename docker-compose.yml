services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: teamtask
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d teamtask"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_ENV: development
      DEBUG: "True"
      SECRET_KEY: local-docker-secret-change-me-at-least-32-chars
      DATABASE_URL: postgres://postgres:postgres@db:5432/teamtask
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      CSRF_TRUSTED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      JWT_COOKIE_SECURE: "False"
      SEED_DEMO: "True"
    ports:
      - "8000:8000"
    volumes:
      - backend-media:/app/media
      - backend-static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
  backend-media:
  backend-static:
